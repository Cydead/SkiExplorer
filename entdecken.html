<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Explorer</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-brand">
            <i data-lucide="mountain-snow" style="color: #fff"></i>
            <h1>SKI EXPLORER</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Start</a>
            <a href="karte.html">Karte</a>
            <a href="entdecken.html" class="active">Entdecken</a>
            <a href="vergleich.html">Vergleich</a>
            <a href="matchmaker.html" id="nav-matchmaker">Matchmaker</a>
        </div>
    </nav>

    <div id="filter-view" class="view" style="display: block;">
        <div id="filter-container">
            <header style="max-width: 800px; margin-bottom: 50px;">
                <h2 style="font-size: 2.5rem; margin-top: 0; letter-spacing: 0.1em; font-weight: 300;">ENTDECKEN</h2>
                <p style="color: var(--text-muted); font-size: 1.1rem; font-weight: 300; line-height: 1.8;">Suchen und filtern Sie durch unsere kuratierte Datenbank der weltweit exklusivsten Skigebiete.</p>
            </header>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="SUCHBEGRIFF EINGEBEN..." oninput="renderFilterView()">
                <button id="clear-search-btn" onclick="clearSearch()" style="display: none; position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);"><i data-lucide="x" size="20"></i></button>
            </div>
            <div class="filter-controls" id="filter-buttons"></div>
            <div class="list-grid" id="resort-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
