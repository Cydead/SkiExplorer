<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Explorer</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-brand">
            <i data-lucide="mountain-snow" style="color: #fff"></i>
            <h1>SKI EXPLORER</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Start</a>
            <a href="karte.html">Karte</a>
            <a href="entdecken.html">Entdecken</a>
            <a href="vergleich.html">Vergleich</a>
            <a href="matchmaker.html" id="nav-matchmaker">Matchmaker</a>
        </div>
    </nav>

    <div id="region-detail-view" class="view" style="display: block;">
        <a href="index.html" class="btn-back" style="text-decoration:none;"><i data-lucide="arrow-left" size="14"></i> Zurück</a>
        <header class="rd-hero" id="rd-hero-img">
            <div class="rd-hero-content">
                <h1 class="rd-title" id="rd-title">LADE REGION...</h1>
                <p class="rd-subtitle" id="rd-subtitle"></p>
            </div>
        </header>
        <div class="rd-content">
            <div class="rd-grid-2">
                <div class="rd-text-box">
                    <h3><i data-lucide="book-open" style="color: var(--accent)"></i> ÜBER DIE REGION</h3>
                    <div id="rd-description"></div>
                </div>
                <div class="rd-text-box">
                    <h3><i data-lucide="wallet" style="color: var(--accent)"></i> KOSTENÜBERSICHT</h3>
                    <p style="font-size: 0.85rem;">Durchschnittliche Tageskosten pro Person in der Hauptsaison (Schätzwert).</p>
                    <div id="rd-costs"></div>
                </div>
            </div>
            <div class="rd-text-box">
                <h3><i data-lucide="camera" style="color: var(--accent)"></i> BEKANNTE SKIGEBIETE</h3>
                <p style="margin-bottom: 30px;">Wählen Sie ein Skigebiet, um die Details auf der Weltkarte zu betrachten.</p>
                <div class="list-grid" id="rd-gallery" style="padding-bottom: 0;"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Ein kurzer Check, um sicherzustellen, dass app.js komplett geladen ist
            if (typeof renderRegion === 'function') {
                renderRegion('japan');
            }
        });
    </script>
</body>
</html>
