<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Explorer</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-brand">
            <i data-lucide="mountain-snow" style="color: #fff"></i>
            <h1>SKI EXPLORER</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Start</a>
            <a href="karte.html">Karte</a>
            <a href="entdecken.html">Entdecken</a>
            <a href="vergleich.html" class="active">Vergleich</a>
            <a href="matchmaker.html" id="nav-matchmaker">Matchmaker</a>
        </div>
    </nav>

    <div id="compare-view" class="view" style="display: block;">
        <div class="compare-wrapper">
            <div class="compare-header-grid">
                <div class="compare-title">
                    <i data-lucide="scale" size="24" style="color: var(--accent); margin-bottom: 15px; stroke-width: 1;"></i><br>
                    RESORT<br>VERGLEICH
                </div>
                <div class="compare-select-wrapper"><select id="compare-select-0" onchange="onCompareChange(0)"></select></div>
                <div class="compare-select-wrapper"><select id="compare-select-1" onchange="onCompareChange(1)"></select></div>
                <div class="compare-select-wrapper"><select id="compare-select-2" onchange="onCompareChange(2)"></select></div>
            </div>
            <div class="compare-table" id="compare-table-body"></div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
        <img id="lightbox-img" src="" alt="Pistenplan Vergrößert">
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
